{% extends "base.html" %}
{% block content %}
<h1>Welcome</h1>
<p>Thank you for agreeing to participate. Before we begin, please set up your profile.</p>

{% if p.prolific_id %}
<p><strong>Your Prolific ID:</strong> {{ p.prolific_id }}</p>
{% endif %}

<form method="POST" action="/welcome">
    <div class="form-group">
        <label>Choose an Avatar</label>
        <div class="avatar-grid">
            {% for avatar in avatars %}
            <div class="avatar-option">
                <input type="radio" name="avatar" id="avatar_{{ avatar }}" value="{{ avatar }}" required>
                <label for="avatar_{{ avatar }}">
                    <img src="/static/avatar/{{ avatar }}" alt="{{ avatar }}">
                </label>
            </div>
            {% endfor %}
        </div>
    </div>

    <div class="form-group">
        <label for="nickname">Choose a Nickname</label>
        <input type="text" id="nickname" name="nickname" placeholder="Enter a nickname" required minlength="2" maxlength="20">
    </div>

    <button type="submit" class="btn">Continue</button>
</form>
{% endblock %}
