<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - ConExperiment 2.0</title>
    <link rel="stylesheet" href="/static/css/main.css">
</head>
<body>
    <div style="max-width: 400px; margin: 100px auto; background: white; padding: 40px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1);">
        <h1 style="text-align: center; margin-bottom: 24px;">Admin Login</h1>

        {% if error %}
        <div class="error" style="text-align: center;">{{ error }}</div>
        {% endif %}

        <form method="POST" action="/admin/login">
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required autofocus>
            </div>
            <button type="submit" class="btn" style="width: 100%; margin-top: 8px;">Login</button>
        </form>

        <p style="text-align: center; margin-top: 20px;">
            <a href="/">Back to Experiment</a>
        </p>
    </div>
</body>
</html>
