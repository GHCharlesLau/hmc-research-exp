services:
  - type: web
    plan: free
    name: conexperiment
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: alembic upgrade head && uvicorn main:app --host 0.0.0.0 --port $PORT --workers 1
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12"
      - key: DATABASE_URL
        fromDatabase:
          name: conexperiment-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: conexperiment-redis
          property: connectionString
      - key: SECRET_KEY
        sync: false
      - key: DEBUG
        value: "false"
      # LLM primary (n1n gateway)
      - key: LLM_API_BASE
        sync: false
      - key: N1N_API_KEY
        sync: false
      # LLM backup (chatanywhere)
      - key: LLM_BACKUP_API_BASE
        sync: false
      - key: LLM_BACKUP_API_KEY
        sync: false
      - key: LLM_BACKUP_MODEL
        value: "gpt-4o-mini"
      # Encryption & Admin
      - key: ENCRYPTION_KEY
        sync: false
      - key: ADMIN_PASSWORD_HASH
        sync: false
      # Prolific
      - key: PROLIFIC_COMPLETION_URL
        sync: false
      - key: PROLIFIC_API_TOKEN
        sync: false
      # Mode
      - key: DEMO_MODE
        value: "false"

  - type: keyvalue
    name: conexperiment-redis
    plan: free
    maxmemoryPolicy: noeviction
    ipAllowList:
      - source: 0.0.0.0/0
        description: allow all connections

databases:
  - name: conexperiment-db
    plan: free
